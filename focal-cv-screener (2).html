::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#BFDBFE;border-radius:4px}
.s-input{width:100%;padding:9px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:13px;font-family:inherit;color:white;background:rgba(255,255,255,0.08);outline:none;transition:border-color .15s}

textarea.s-input{resize:vertical;line-height:1.5}
.f-input{width:100%;padding:8px 11px;border:1.5px solid #DBEAFE;border-radius:8px;font-size:12px;font-family:inherit;color:#0F172A;background:white;outline:none;transition:border-color .15s}
.f-input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease forwards;opacity:0}
@media(max-width:880px){

  .app-sidebar{width:100%!important;min-width:0!important}
  .app-main{height:auto!important}
}

// ── Utilities ────────────────────────────────────────────
function loadScript(src){
  return new Promise((res,rej)=>{
    const ex=document.querySelector('script[src="'+src+'"]');
    if(ex){if(ex._ok){res();return;}ex.addEventListener("load",()=>{ex._ok=true;res()});return;}
    const s=document.createElement("script");s.src=src;
    s.onload=()=>{s._ok=true;res()};s.onerror=rej;document.head.appendChild(s);
  });
}

// ── CV Extraction ────────────────────────────────────────
async function fromPDF(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let text="";const images=[];
  for(let i=1;i<=Math.min(pdf.numPages,6);i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    text+=tc.items.map(x=>x.str).join(" ")+"\n";
    const vp=page.getViewport({scale:1.5});
    const canvas=document.createElement("canvas");canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
    images.push({data:canvas.toDataURL("image/jpeg",0.85).split(",")[1],mediaType:"image/jpeg"});
  }
  const isImageBased=text.replace(/\s/g,"").length<80;
  return{text,images,isImageBased};
}
async function fromDOCX(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
  const text=(await window.mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()})).value;
  return{text,images:[],isImageBased:false};
}
async function fromImage(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const data=e.target.result.split(",")[1];
      res({text:"",images:[{data,mediaType:file.type||"image/jpeg"}],isImageBased:true});
    };
    reader.onerror=rej;reader.readAsDataURL(file);
  });
}

// ── Claude Analysis ──────────────────────────────────────
const PROMPT_SCHEMA='Extract ALL available information carefully. Respond ONLY with valid JSON, no markdown:\n{"candidate_name":"full name or Unknown","score":<0-100>,"match_level":"Excellent|Good|Fair|Poor","years_experience":<int or null>,"current_role":"recent title or null","nationality":"country of nationality if mentioned or null","location":"current country/city if mentioned or null","age":<int or null>,"gender":"Male|Female|null","companies":["company1","company2"],"me_experience":<int or null>,"me_companies":[{"name":"company","country":"UAE","years":<int or null>}],"top_strengths":["s1","s2","s3"],"concerns":[] or ["c1","c2"],"key_skills":["sk1","sk2","sk3","sk4","sk5","sk6"],"languages":["English","Arabic"],"education":"highest degree and field or null","universities":["University of X","MIT"],"summary":"3-4 sentences on fit for this specific role"}\n\nNotes:\n- nationality: look for passport, citizenship, nationality statements\n- location: current city/country they live or work in\n- age: calculate from birth year if stated (current year is 2026), or extract directly if written\n- gender: infer from name or pronouns only if very clear, otherwise null\n- companies: list ALL companies/employers mentioned\n- languages: list all languages mentioned\n- me_experience: total years worked in ME region (UAE, Saudi Arabia, Qatar, Kuwait, Bahrain, Oman, Jordan, Egypt, Lebanon, Iraq). Integer or null.\n- me_companies: ME-based employers only, with country and years (null if unclear).\n- universities: list ALL universities, colleges, or educational institutions mentioned. Empty array [] if none found.';

async function analyzeCV(extracted,jobTitle,jobDesc,apiKey,attempt=0){
  const{text,images,isImageBased}=extracted;
  const headers={"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
  if(apiKey)headers["x-api-key"]=apiKey;
  const intro="You are an expert HR recruiter. Analyze this CV thoroughly for the role: \""+jobTitle+"\""+( jobDesc?"\n\nJob description:\n"+jobDesc:"");
  let msgContent;
  if(isImageBased&&images.length>0){
    msgContent=[
      {type:"text",text:intro+"\n\nThis CV is image-based. Read all text visible in the image(s) carefully.\n\n"+PROMPT_SCHEMA},
      ...images.map(img=>({type:"image",source:{type:"base64",media_type:img.mediaType,data:img.data}}))
    ];
  } else {
    msgContent=intro+"\n\n"+PROMPT_SCHEMA+"\n\nFULL CV:\n"+text;
  }
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers,
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1600,messages:[{role:"user",content:msgContent}]})
    });
    if(resp.status===429&&attempt<5){
      await new Promise(r=>setTimeout(r,Math.min(2000*Math.pow(2,attempt),30000)));
      return analyzeCV(extracted,jobTitle,jobDesc,apiKey,attempt+1);
    }
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||"API "+resp.status);}
    const d=await resp.json();
    return JSON.parse(d.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
  }catch(err){
    if(attempt<3&&(err.message.includes("fetch")||err.message.includes("network"))){
      await new Promise(r=>setTimeout(r,2000));
      return analyzeCV(extracted,jobTitle,jobDesc,apiKey,attempt+1);
    }
    throw err;
  }
}

// ── UI Components ────────────────────────────────────────
function Spin({color="#3B82F6",size=16}){
  return R("div",{style:{width:size,height:size,border:"2.5px solid "+color+"22",borderTopColor:color,borderRadius:"50%",animation:"spin .7s linear infinite",flexShrink:0}});
}
function Ring({score,size=90}){
  if(score==null)return null;
  const r=size/2-10,circ=2*Math.PI*r,dash=(score/100)*circ;
  const col=score>=75?"#10B981":score>=50?"#F59E0B":"#EF4444";
  const tr=score>=75?"#D1FAE5":score>=50?"#FEF3C7":"#FEE2E2";
  return R("svg",{width:size,height:size,style:{display:"block",flexShrink:0}},
    R("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:tr,strokeWidth:"8"}),
    R("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:col,strokeWidth:"8",strokeDasharray:dash+" "+circ,strokeLinecap:"round",style:{transform:"rotate(-90deg)",transformOrigin:"center"}}),
    R("text",{x:size/2,y:size/2-7,textAnchor:"middle",dominantBaseline:"central",fill:col,fontSize:"20",fontWeight:"700"},score),
    R("text",{x:size/2,y:size/2+12,textAnchor:"middle",fill:col,fontSize:"10",opacity:"0.6"},"/100")
  );
}
function MiniRing({score,size=50}){
  if(score==null)return null;
  const r=size/2-6,circ=2*Math.PI*r,dash=(score/100)*circ;
  const col=score>=75?"#10B981":score>=50?"#F59E0B":"#EF4444";
  const tr=score>=75?"#DCFCE7":score>=50?"#FEF9C3":"#FEE2E2";
  return R("svg",{width:size,height:size,style:{display:"block",flexShrink:0}},
    R("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:tr,strokeWidth:"5.5"}),
    R("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:col,strokeWidth:"5.5",strokeDasharray:dash+" "+circ,strokeLinecap:"round",style:{transform:"rotate(-90deg)",transformOrigin:"center"}}),
    R("text",{x:size/2,y:size/2,textAnchor:"middle",dominantBaseline:"central",fill:col,fontSize:"13",fontWeight:"700"},score)
  );
}

// ── PDF/DOCX Viewer ──────────────────────────────────────
function PDFViewer({file}){
  const ref=useRef(null);
  const[status,setStatus]=useState("loading");
  const[pages,setPages]=useState(0);
  useEffect(()=>{
    if(!file)return;let dead=false;setStatus("loading");setPages(0);
    if(ref.current)ref.current.innerHTML="";
    (async()=>{try{
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
      window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
      if(dead||!ref.current)return;setPages(pdf.numPages);
      for(let i=1;i<=pdf.numPages;i++){
        if(dead||!ref.current)break;
        const page=await pdf.getPage(i);const vp=page.getViewport({scale:1.6});
        const canvas=document.createElement("canvas");canvas.width=vp.width;canvas.height=vp.height;
        Object.assign(canvas.style,{width:"100%",display:"block",marginBottom:"10px",borderRadius:"8px",boxShadow:"0 2px 10px rgba(0,0,0,0.12)"});
        ref.current.appendChild(canvas);
        await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
      }
      if(!dead)setStatus("done");
    }catch(e){if(!dead)setStatus("error");}})();
    return()=>{dead=true;};
  },[file]);
  return R("div",null,
    status==="loading"&&R("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"3rem",color:"#64748B",fontSize:14}},R(Spin,{color:"#2563EB",size:20}),"Rendering PDF…"),
    status==="error"&&R("div",{style:{padding:"2rem",textAlign:"center",color:"#EF4444",fontSize:14}},"Could not render PDF preview."),
    R("div",{ref,style:{maxHeight:"calc(100vh - 360px)",overflowY:"auto",padding:"4px"}}),
    status==="done"&&R("div",{style:{fontSize:12,color:"#94A3B8",textAlign:"center",marginTop:6}},pages+" page"+(pages!==1?"s":""))
  );
}
function DOCXViewer({file}){
  const[html,setHtml]=useState("");
  const[status,setStatus]=useState("loading");
  useEffect(()=>{
    if(!file)return;
    (async()=>{try{
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
      const r=await window.mammoth.convertToHtml({arrayBuffer:await file.arrayBuffer()});
      setHtml(r.value);setStatus("done");
    }catch(e){setStatus("error");}})();
  },[file]);
  if(status==="loading")return R("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"3rem",color:"#64748B",fontSize:14}},R(Spin,{color:"#2563EB",size:20}),"Rendering document…");
  if(status==="error")return R("div",{style:{padding:"2rem",textAlign:"center",color:"#EF4444",fontSize:14}},"Could not render document preview.");
  return R("div",{style:{maxHeight:"calc(100vh - 360px)",overflowY:"auto",background:"white",borderRadius:10,border:"1px solid #DBEAFE",padding:"28px 36px"}},
    R("div",{dangerouslySetInnerHTML:{__html:html},style:{fontFamily:"Georgia,serif",fontSize:14,lineHeight:1.9,color:"#0F172A"}})
  );
}
function CVViewer({candidate}){
  const file=candidate._fileObj;
  if(!file)return R("div",{style:{padding:"2rem",textAlign:"center",color:"#94A3B8",fontSize:14}},"File preview not available.");
  const n=file.name.toLowerCase();
  return(n.endsWith(".pdf")||file.type==="application/pdf")?R(PDFViewer,{file}):R(DOCXViewer,{file});
}

// ── Checklist Dropdown ───────────────────────────────────
function ChecklistDropdown({label,options,selected,onChange,placeholder}){
  const[open,setOpen]=useState(false);
  const[search,setSearch]=useState("");
  const[rect,setRect]=useState(null);
  const btnRef=useRef();const dropRef=useRef();
  useEffect(()=>{
    if(!open)return;
    const update=()=>{if(btnRef.current)setRect(btnRef.current.getBoundingClientRect());};
    update();
    const handler=e=>{if(btnRef.current&&!btnRef.current.contains(e.target)&&dropRef.current&&!dropRef.current.contains(e.target)){setOpen(false);setSearch("");}};
    document.addEventListener("mousedown",handler);window.addEventListener("scroll",update,true);
    return()=>{document.removeEventListener("mousedown",handler);window.removeEventListener("scroll",update,true);};
  },[open]);
  const filtered=options.filter(o=>o.toLowerCase().includes(search.toLowerCase()));
  const toggle=o=>onChange(selected.includes(o)?selected.filter(x=>x!==o):[...selected,o]);
  const btnLabel=selected.length===0?placeholder:selected.length===1?selected[0]:selected.length+" selected";
  return R("div",{style:{position:"relative",width:"100%"}},
    R("button",{ref:btnRef,className:"f-input",onClick:()=>setOpen(v=>!v),
      style:{cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,textAlign:"left",whiteSpace:"nowrap",overflow:"hidden",borderColor:open?"#2563EB":"#DBEAFE"}},
      R("span",{style:{overflow:"hidden",textOverflow:"ellipsis",flex:1,minWidth:0}},btnLabel),
      selected.length>0&&R("span",{onPointerDown:e=>{e.stopPropagation();e.preventDefault();onChange([]);setOpen(false);},
        style:{background:"#DBEAFE",color:"#1D4ED8",borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700,flexShrink:0,cursor:"pointer"}},"× "+selected.length),
      R("span",{style:{flexShrink:0,color:"#94A3B8",fontSize:10}},open?"▲":"▼")
    ),
    open&&rect&&R("div",{ref:dropRef,style:{position:"fixed",top:rect.bottom+4,left:rect.left,width:rect.width,background:"white",border:"1.5px solid #DBEAFE",borderRadius:9,boxShadow:"0 8px 32px rgba(37,99,235,0.18)",zIndex:99999,maxHeight:240,overflowY:"auto"}},
      R("div",{style:{position:"sticky",top:0,background:"white",borderBottom:"1px solid #EFF6FF",padding:"6px 8px"}},
        R("input",{style:{width:"100%",padding:"6px 10px",border:"1.5px solid #DBEAFE",borderRadius:7,fontSize:12,fontFamily:"inherit",outline:"none",color:"#0F172A"},
          value:search,onChange:e=>setSearch(e.target.value),placeholder:"Search "+label.toLowerCase()+"...",onClick:e=>e.stopPropagation(),autoFocus:true})
      ),
      filtered.length===0&&R("div",{style:{padding:14,fontSize:12,color:"#94A3B8",textAlign:"center"}},"No matches"),
      ...filtered.map(o=>{
        const checked=selected.includes(o);
        return R("div",{key:o,onClick:()=>toggle(o),style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer",background:checked?"#EFF6FF":"white",borderBottom:"1px solid #F8FAFC"}},
          R("div",{style:{width:16,height:16,borderRadius:4,border:"2px solid "+(checked?"#2563EB":"#CBD5E1"),background:checked?"#2563EB":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
            checked&&R("svg",{width:"10",height:"8",viewBox:"0 0 10 8",fill:"none"},R("path",{d:"M1 4l3 3 5-6",stroke:"white",strokeWidth:"1.8",strokeLinecap:"round",strokeLinejoin:"round"}))
          ),
          R("span",{style:{fontSize:12,color:"#0F172A",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:checked?600:400}},o)
        );
      })
    )
  );
}

// ── Filter/Sort ──────────────────────────────────────────
function applyFiltersAndSort(results,filters,sortBy){
  let r=results.filter(c=>!c._imageOnly);
  if(filters.matchLevel)r=r.filter(c=>c.match_level===filters.matchLevel);
  if(filters.gender)r=r.filter(c=>c.gender===filters.gender);
  if(filters.country){const q=filters.country.toLowerCase();r=r.filter(c=>(c.nationality||"").toLowerCase().includes(q)||(c.location||"").toLowerCase().includes(q));}
  if(filters.ageMin)r=r.filter(c=>c.age!=null&&c.age>=parseInt(filters.ageMin));
  if(filters.ageMax)r=r.filter(c=>c.age!=null&&c.age<=parseInt(filters.ageMax));
  if(filters.companies&&filters.companies.length>0)r=r.filter(c=>filters.companies.some(fc=>(c.companies||[]).some(co=>co.toLowerCase()===fc.toLowerCase())));
  if(filters.universities&&filters.universities.length>0)r=r.filter(c=>filters.universities.some(fu=>(c.universities||[]).some(u=>u.toLowerCase()===fu.toLowerCase())));
  if(sortBy==="name")r.sort((a,b)=>a.candidate_name.localeCompare(b.candidate_name));
  else if(sortBy==="age")r.sort((a,b)=>(a.age!=null?a.age:999)-(b.age!=null?b.age:999));
  else if(sortBy==="age_desc")r.sort((a,b)=>(b.age!=null?b.age:0)-(a.age!=null?a.age:0));
  else if(sortBy==="exp")r.sort((a,b)=>(b.years_experience||0)-(a.years_experience||0));
  else if(sortBy==="me_exp")r.sort((a,b)=>(b.me_experience||0)-(a.me_experience||0));
  else r.sort((a,b)=>b.score-a.score);
  return r;
}

function downloadFile(content,filename,type){

  const url=URL.createObjectURL(blob);

  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);

            R("div",{style:{display:"flex",flexWrap:"wrap",gap:6,fontSize:11,color:"#64748B"}},
              c.current_role&&R("span",null,c.current_role),
              c.years_experience!=null&&R("span",{style:{color:"#94A3B8"}},"· "+c.years_experience+"yr exp"),
              c.age!=null&&R("span",{style:{color:"#7C3AED",fontWeight:600}},"· Age "+c.age),
              (c.nationality||c.location)&&R("span",{style:{color:"#0891B2"}},"· 🌍 "+(c.nationality||c.location)),
              c.gender&&R("span",null,"· "+(c.gender==="Male"?"♂":"♀")+" "+c.gender),
              c.me_experience>0&&R("span",{style:{background:"#FFF7ED",color:"#C2410C",border:"1px solid #FED7AA",borderRadius:20,fontSize:10,fontWeight:700,padding:"1px 7px"}},"🇦🇪 "+c.me_experience+"yr ME")
            )
          ),
          !isOpen&&c.key_skills&&c.key_skills.length>0&&R("div",{style:{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:200}},...c.key_skills.slice(0,3).map((s,si)=>R("span",{key:si,style:{fontSize:10,padding:"2px 8px",background:"#EFF6FF",color:"#1D4ED8",borderRadius:20,border:"1px solid #BFDBFE",whiteSpace:"nowrap"}},s))),
          R("span",{style:{fontSize:14,color:"#94A3B8",flexShrink:0}},isOpen?"▲":"▼")
        ),
        isOpen&&R(CandidateDetail,{c,showCV:true})
      );
    }),
    imageOnly.length>0&&R("div",{style:{marginTop:16,padding:"14px 18px",background:"#FFFBEB",borderRadius:12,border:"1px solid #FDE68A"}},
      R("div",{style:{fontSize:12,fontWeight:700,color:"#78350F",marginBottom:8}},"🖼️ Image-based CVs ("+imageOnly.length+") — manual review needed"),
      ...imageOnly.map((c,i)=>R("div",{key:i,style:{fontSize:12,color:"#92400E",padding:"4px 0"}},c.candidate_name||c._file))
    )
  );
}

// ── Main App ─────────────────────────────────────────────
function App(){
  const[step,setStep]=useState("setup");
  const[jobTitle,setJobTitle]=useState("");
  const[jobDesc,setJobDesc]=useState("");
  const[apiKey,setApiKey]=useState(localStorage.getItem("focal_api_key")||"");
  const[showKey,setShowKey]=useState(false);
  const[files,setFiles]=useState([]);
  const[topN,setTopN]=useState(3);
  const[progress,setProg]=useState([]);
  const[results,setResults]=useState([]);
  const[error,setError]=useState("");

  useEffect(()=>{if(apiKey)localStorage.setItem("focal_api_key",apiKey);else localStorage.removeItem("focal_api_key");},[apiKey]);

  const addFiles=useCallback(list=>{
    const ok=Array.from(list).filter(f=>{
      const n=f.name.toLowerCase();
      return n.endsWith(".pdf")||n.endsWith(".docx")||n.endsWith(".doc")||n.endsWith(".jpg")||n.endsWith(".jpeg")||n.endsWith(".png");
    });
    setFiles(p=>{const s=new Set(p.map(x=>x.name));return[...p,...ok.filter(f=>!s.has(f.name))];});
  },[]);
  const removeFile=i=>setFiles(p=>p.filter((_,j)=>j!==i));
  const clearFiles=()=>setFiles([]);

  const ready=jobTitle.trim()&&files.length>0&&apiKey.trim();

  const analyze=async()=>{
    if(!ready)return;
    setStep("analyzing");setError("");
    setProg(files.map(f=>({name:f.name,status:"pending"})));
    const done=[];
    for(let i=0;i<files.length;i++){
      const f=files[i];
      const n=f.name.toLowerCase();
      const isPDF=n.endsWith(".pdf")||f.type==="application/pdf";
      const isImg=n.endsWith(".jpg")||n.endsWith(".jpeg")||n.endsWith(".png")||f.type.startsWith("image/");
      setProg(p=>p.map((x,j)=>j===i?{...x,status:"extracting"}:x));
      try{
        const extracted=isPDF?await fromPDF(f):isImg?await fromImage(f):await fromDOCX(f);
        if(extracted.isImageBased&&!extracted.images.length){
          const r={candidate_name:f.name.replace(/\.[^.]+$/,""),score:null,match_level:null,_file:f.name,_fileObj:f,_imageOnly:true};
          done.push(r);
          setProg(p=>p.map((x,j)=>j===i?{...x,status:"image"}:x));
        } else {
          setProg(p=>p.map((x,j)=>j===i?{...x,status:"analyzing"}:x));
          const r=await analyzeCV(extracted,jobTitle,jobDesc,apiKey);
          r._file=f.name;r._fileObj=f;r._imageOnly=false;r._isVision=extracted.isImageBased;
          done.push(r);
          setProg(p=>p.map((x,j)=>j===i?{...x,status:"done"}:x));
        }
      }catch(err){
        setProg(p=>p.map((x,j)=>j===i?{...x,status:"error",msg:err.message}:x));
      }
      if(i<files.length-1)await new Promise(r=>setTimeout(r,400));
    }
    if(!done.length){setError("All files failed. Check file formats or API key.");setStep("setup");return;}
    setResults(done.sort((a,b)=>{if(a._imageOnly&&!b._imageOnly)return 1;if(!a._imageOnly&&b._imageOnly)return-1;return(b.score||0)-(a.score||0);}));
    setStep("results");
  };

  const showResults=step==="results"||step==="analyzing";

  return R("div",{className:"app-shell",style:{display:"flex",height:"100vh",overflow:"hidden"}},
    R(Sidebar,{jobTitle,setJobTitle,jobDesc,setJobDesc,apiKey,setApiKey,showKey,setShowKey,topN,setTopN,files,setFiles,addFiles,removeFile,clearFiles,onAnalyze:analyze,ready,step}),
    R("main",{className:"app-main",style:{flex:1,background:"#EEF4FF",overflowY:"auto",height:"100%"}},
      error&&R("div",{style:{padding:"12px 20px",background:"#FEF2F2",border:"1px solid #FECACA",margin:"16px 24px",borderRadius:8,color:"#DC2626",fontSize:13}},error),
      !showResults&&R(Welcome),
      showResults&&R(ResultsPanel,{results,topN,jobTitle,progress,step})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(R(App));
</script>
</body>
</html>
