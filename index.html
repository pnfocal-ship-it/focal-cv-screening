function loadScript(src){
  return new Promise((res,rej)=>{
    const ex=document.querySelector('script[src="'+src+'"]');
    if(ex){if(ex._ok){res();return;}ex.addEventListener("load",()=>{ex._ok=true;res()});return;}
    const s=document.createElement("script");s.src=src;
    s.onload=()=>{s._ok=true;res()};s.onerror=rej;document.head.appendChild(s);
  });
}

async function fromPDF(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let text="";const images=[];
  for(let i=1;i<=Math.min(pdf.numPages,6);i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    text+=tc.items.map(x=>x.str).join(" ")+"\n";
    const vp=page.getViewport({scale:1.5});
    const canvas=document.createElement("canvas");canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
    images.push({data:canvas.toDataURL("image/jpeg",0.85).split(",")[1],mediaType:"image/jpeg"});
  }
  const isImageBased=text.replace(/\s/g,"").length<80;
  return{text,images,isImageBased};
}
async function fromDOCX(file){
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
  const text=(await window.mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()})).value;
  return{text,images:[],isImageBased:false};
}
async function fromImage(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const data=e.target.result.split(",")[1];
      res({text:"",images:[{data,mediaType:file.type||"image/jpeg"}],isImageBased:true});
    };
    reader.onerror=rej;reader.readAsDataURL(file);
  });
}

const PROMPT_SCHEMA='Extract ALL available information carefully. Respond ONLY with valid JSON, no markdown:\n{"candidate_name":"full name or Unknown","score":<0-100>,"match_level":"Excellent|Good|Fair|Poor","years_experience":<int or null>,"current_role":"recent title or null","nationality":"country of nationality if mentioned or null","location":"current country/city if mentioned or null","age":<int or null>,"gender":"Male|Female|null","companies":["company1","company2"],"me_experience":<int or null>,"me_companies":[{"name":"company","country":"UAE","years":<int or null>}],"top_strengths":["s1","s2","s3"],"concerns":[] or ["c1","c2"],"key_skills":["sk1","sk2","sk3","sk4","sk5","sk6"],"languages":["English","Arabic"],"education":"highest degree and field or null","universities":["University of X","MIT"],"summary":"3-4 sentences on fit for this specific role"}\n\nNotes:\n- nationality: look for passport, citizenship, nationality statements\n- location: current city/country they live or work in\n- age: calculate from birth year if stated (current year is 2026), or extract directly if written\n- gender: infer from name or pronouns only if very clear, otherwise null\n- companies: list ALL companies/employers mentioned\n- languages: list all languages mentioned\n- me_experience: total years worked in ME region (UAE, Saudi Arabia, Qatar, Kuwait, Bahrain, Oman, Jordan, Egypt, Lebanon, Iraq). Integer or null.\n- me_companies: ME-based employers only, with country and years (null if unclear).\n- universities: list ALL universities, colleges, or educational institutions mentioned. Empty array [] if none found.';

async function analyzeCV(extracted,jobTitle,jobDesc,apiKey,attempt=0){
  const {text,images,isImageBased}=extracted;
  const headers={"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
  if(apiKey) headers["x-api-key"]=apiKey;
  const intro='You are an expert HR recruiter. Analyze this CV thoroughly for the role: "'+jobTitle+'"'+(jobDesc?'\n\nJob description:\n'+jobDesc:'');
  let msgContent;
  if(isImageBased&&images.length>0){
    msgContent=[
      {type:"text",text:intro+'\n\nThis CV is image-based. Read all text visible in the image(s) carefully.\n\n'+PROMPT_SCHEMA},
      ...images.map(img=>({type:"image",source:{type:"base64",media_type:img.mediaType,data:img.data}}))
    ];
  } else {
    msgContent=intro+'\n\n'+PROMPT_SCHEMA+'\n\nFULL CV:\n'+text;
  }
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers,
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1600,messages:[{role:"user",content:msgContent}]})
    });
    if(resp.status===429&&attempt<5){
      await new Promise(r=>setTimeout(r,Math.min(2000*Math.pow(2,attempt),30000)));
      return analyzeCV(extracted,jobTitle,jobDesc,apiKey,attempt+1);
    }
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API '+resp.status);}
    const d=await resp.json();
    return JSON.parse(d.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
  }catch(err){
    if(attempt<3&&(err.message.includes("fetch")||err.message.includes("network"))){
      await new Promise(r=>setTimeout(r,2000));
      return analyzeCV(extracted,jobTitle,jobDesc,apiKey,attempt+1);
    }
    throw err;
  }
}

function Ring({score,size=90}){
  if(score==null) return null;
  const r=size/2-10,circ=2*Math.PI*r,dash=(score/100)*circ;
  const col=score>=75?"#10B981":score>=50?"#F59E0B":"#EF4444";
  const tr=score>=75?"#D1FAE5":score>=50?"#FEF3C7":"#FEE2E2";
  return(<svg width={size} height={size} style={{display:"block",flexShrink:0}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={tr} strokeWidth="8"/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="8" strokeDasharray={dash+" "+circ} strokeLinecap="round" style={{transform:"rotate(-90deg)",transformOrigin:"center"}}/>
    <text x={size/2} y={size/2-7} textAnchor="middle" dominantBaseline="central" fill={col} fontSize="20" fontWeight="700">{score}</text>
    <text x={size/2} y={size/2+12} textAnchor="middle" fill={col} fontSize="10" opacity="0.6">/100</text>
  </svg>);
}
function MiniRing({score,size=50}){
  if(score==null) return null;
  const r=size/2-6,circ=2*Math.PI*r,dash=(score/100)*circ;
  const col=score>=75?"#10B981":score>=50?"#F59E0B":"#EF4444";
  const tr=score>=75?"#DCFCE7":score>=50?"#FEF9C3":"#FEE2E2";
  return(<svg width={size} height={size} style={{display:"block",flexShrink:0}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={tr} strokeWidth="5.5"/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="5.5" strokeDasharray={dash+" "+circ} strokeLinecap="round" style={{transform:"rotate(-90deg)",transformOrigin:"center"}}/>
    <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central" fill={col} fontSize="13" fontWeight="700">{score}</text>
  </svg>);
}
function Spin({color="#3B82F6",size=16}){
  return <div style={{width:size,height:size,border:"2.5px solid "+color+"22",borderTopColor:color,borderRadius:"50%",animation:"spin .7s linear infinite",flexShrink:0}}/>;
}

function PDFViewer({file}){
  const ref=useRef(null);const[status,setStatus]=useState("loading");const[pages,setPages]=useState(0);
  useEffect(()=>{
    if(!file)return;let dead=false;setStatus("loading");setPages(0);
    if(ref.current)ref.current.innerHTML="";
    (async()=>{try{
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
      window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
      if(dead||!ref.current)return;setPages(pdf.numPages);
      for(let i=1;i<=pdf.numPages;i++){
        if(dead||!ref.current)break;
        const page=await pdf.getPage(i);const vp=page.getViewport({scale:1.6});
        const canvas=document.createElement("canvas");canvas.width=vp.width;canvas.height=vp.height;
        Object.assign(canvas.style,{width:"100%",display:"block",marginBottom:"10px",borderRadius:"8px",boxShadow:"0 2px 10px rgba(0,0,0,0.12)"});
        ref.current.appendChild(canvas);
        await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
      }
      if(!dead)setStatus("done");
    }catch(e){if(!dead)setStatus("error");}})();
    return()=>{dead=true;};
  },[file]);
  return(<div>
    {status==="loading"&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"3rem",color:"#64748B",fontSize:14}}><Spin color="#2563EB" size={20}/>Rendering PDF…</div>}
    {status==="error"&&<div style={{padding:"2rem",textAlign:"center",color:"#EF4444",fontSize:14}}>Could not render PDF preview.</div>}
    <div ref={ref} style={{maxHeight:"calc(100vh - 360px)",overflowY:"auto",padding:"4px"}}/>
    {status==="done"&&<div style={{fontSize:12,color:"#94A3B8",textAlign:"center",marginTop:6}}>{pages} page{pages!==1?"s":""}</div>}
  </div>);
}
function DOCXViewer({file}){
  const[html,setHtml]=useState("");const[status,setStatus]=useState("loading");
  useEffect(()=>{
    if(!file)return;
    (async()=>{try{
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
      const r=await window.mammoth.convertToHtml({arrayBuffer:await file.arrayBuffer()});
      setHtml(r.value);setStatus("done");
    }catch(e){setStatus("error");}})();
  },[file]);
  if(status==="loading")return <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"3rem",color:"#64748B",fontSize:14}}><Spin color="#2563EB" size={20}/>Rendering document…</div>;
  if(status==="error")return <div style={{padding:"2rem",textAlign:"center",color:"#EF4444",fontSize:14}}>Could not render document preview.</div>;
  return(<div style={{maxHeight:"calc(100vh - 360px)",overflowY:"auto",background:"white",borderRadius:10,border:"1px solid #DBEAFE",padding:"28px 36px"}}>
    <div dangerouslySetInnerHTML={{__html:html}} style={{fontFamily:"Georgia,serif",fontSize:14,lineHeight:1.9,color:"#0F172A"}}/>
  </div>);
}
function CVViewer({candidate}){
  const file=candidate._fileObj;
  if(!file)return <div style={{padding:"2rem",textAlign:"center",color:"#94A3B8",fontSize:14}}>File preview not available.</div>;
  return file.name.toLowerCase().endsWith(".pdf")||file.type==="application/pdf"?<PDFViewer file={file}/>:<DOCXViewer file={file}/>;
}

/* ── Checklist Dropdown ─── */
function ChecklistDropdown({label,options,selected,onChange,placeholder}){
  const[open,setOpen]=useState(false);const[search,setSearch]=useState("");const[rect,setRect]=useState(null);
  const btnRef=useRef();const dropRef=useRef();
  useEffect(()=>{
    if(!open)return;
    const update=()=>{if(btnRef.current)setRect(btnRef.current.getBoundingClientRect());};
    update();
    const handler=e=>{if(btnRef.current&&!btnRef.current.contains(e.target)&&dropRef.current&&!dropRef.current.contains(e.target)){setOpen(false);setSearch("");}};
    document.addEventListener("mousedown",handler);window.addEventListener("scroll",update,true);
    return()=>{document.removeEventListener("mousedown",handler);window.removeEventListener("scroll",update,true);};
  },[open]);
  const filtered=options.filter(o=>o.toLowerCase().includes(search.toLowerCase()));
  const toggle=o=>onChange(selected.includes(o)?selected.filter(x=>x!==o):[...selected,o]);
  const btnLabel=selected.length===0?placeholder:selected.length===1?selected[0]:selected.length+" selected";
  return(
    <div style={{position:"relative",width:"100%"}}>
      <button ref={btnRef} className={"f-input"} onClick={()=>setOpen(v=>!v)} style={{cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,textAlign:"left",whiteSpace:"nowrap",overflow:"hidden",borderColor:open?"#2563EB":"#DBEAFE"}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",flex:1,minWidth:0}}>{btnLabel}</span>
        {selected.length>0&&<span onPointerDown={e=>{e.stopPropagation();e.preventDefault();onChange([]);setOpen(false);}} style={{background:"#DBEAFE",color:"#1D4ED8",borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700,flexShrink:0,cursor:"pointer"}}>{"\u2715"} {selected.length}</span>}
        <span style={{flexShrink:0,color:"#94A3B8",fontSize:10}}>{open?"\u25B2":"\u25BC"}</span>
      </button>
      {open&&rect&&(
        <div ref={dropRef} style={{position:"fixed",top:rect.bottom+4,left:rect.left,width:rect.width,background:"white",border:"1.5px solid #DBEAFE",borderRadius:9,boxShadow:"0 8px 32px rgba(37,99,235,0.18)",zIndex:99999,maxHeight:240,overflowY:"auto"}}>
          <div style={{position:"sticky",top:0,background:"white",borderBottom:"1px solid #EFF6FF",padding:"6px 8px"}}>
            <input style={{width:"100%",padding:"6px 10px",border:"1.5px solid #DBEAFE",borderRadius:7,fontSize:12,fontFamily:"inherit",outline:"none",color:"#0F172A"}} value={search} onChange={e=>setSearch(e.target.value)} placeholder={"Search "+label.toLowerCase()+"..."} onClick={e=>e.stopPropagation()} autoFocus/>
          </div>
          {filtered.length===0&&<div style={{padding:14,fontSize:12,color:"#94A3B8",textAlign:"center"}}>No matches</div>}
          {filtered.map(o=>{
            const checked=selected.includes(o);
            return(<div key={o} onClick={()=>toggle(o)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer",background:checked?"#EFF6FF":"white",borderBottom:"1px solid #F8FAFC"}}>
              <div style={{width:16,height:16,borderRadius:4,border:"2px solid "+(checked?"#2563EB":"#CBD5E1"),background:checked?"#2563EB":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {checked&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <span style={{fontSize:12,color:"#0F172A",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:checked?600:400}}>{o}</span>
            </div>);
          })}
        </div>
      )}
    </div>
  );
}

function Chip({label,onRemove}){
  return(<span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,padding:"3px 10px",background:"#EFF6FF",color:"#1D4ED8",borderRadius:20,border:"1px solid #BFDBFE"}}>{label}<button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",color:"#93C5FD",padding:0,fontSize:12,lineHeight:1,fontFamily:"inherit"}}>{"\u2715"}</button></span>);
}

/* ── Filter Bar ─── */
function FilterBar({results,filters,setFilters,sortBy,setSortBy}){
  const countries=useMemo(()=>{const s=new Set();results.forEach(r=>{if(r.nationality)s.add(r.nationality);if(r.location)s.add(r.location);});return[...s].sort();},[results]);
  const allCompanies=useMemo(()=>{const s=new Set();results.forEach(r=>(r.companies||[]).forEach(c=>c&&s.add(c)));return[...s].sort();},[results]);
  const allUniversities=useMemo(()=>{const s=new Set();results.forEach(r=>(r.universities||[]).forEach(u=>u&&s.add(u)));return[...s].sort();},[results]);
  const selCos=filters.companies||[];const selUnis=filters.universities||[];
  const activeCount=[filters.gender,filters.country,selCos.length>0,selUnis.length>0,filters.ageMin||filters.ageMax,filters.matchLevel].filter(Boolean).length;
  const clearAll=()=>setFilters({gender:"",country:"",companies:[],universities:[],ageMin:"",ageMax:"",matchLevel:""});
  return(
    <div style={{background:"white",border:"1.5px solid #DBEAFE",borderRadius:12,padding:"14px 16px",marginBottom:14,maxWidth:820}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>{"\uD83D\uDD0D"}</span>
          <span style={{fontSize:13,fontWeight:700,color:"#0D2171"}}>Filter & Sort</span>
          {activeCount>0&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",background:"#2563EB",color:"white",borderRadius:20}}>{activeCount} active</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"5px 10px",borderRadius:7,border:"1.5px solid #DBEAFE",fontSize:12,fontFamily:"inherit",color:"#0D2171",background:"white",cursor:"pointer"}}>
            <option value="score">Sort: Best Score</option>
            <option value="name">Sort: Name A-Z</option>
            <option value="age">Sort: Youngest First</option>
            <option value="age_desc">Sort: Oldest First</option>
            <option value="exp">Sort: Most Experience</option>
            <option value="me_exp">Sort: Most ME/UAE Exp</option>
          </select>
          {activeCount>0&&<button onClick={clearAll} style={{padding:"5px 11px",borderRadius:7,border:"1.5px solid #FECACA",background:"#FFF1F1",color:"#EF4444",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"\u2715"} Clear all</button>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:10}}>
        <div><label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>Match Level</label>
          <select value={filters.matchLevel} onChange={e=>setFilters(f=>({...f,matchLevel:e.target.value}))} className="f-input"><option value="">All levels</option><option value="Excellent">Excellent</option><option value="Good">Good</option><option value="Fair">Fair</option><option value="Poor">Poor</option></select></div>
        <div><label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>Gender</label>
          <select value={filters.gender} onChange={e=>setFilters(f=>({...f,gender:e.target.value}))} className="f-input"><option value="">All genders</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
        <div><label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>Country</label>
          <select value={filters.country} onChange={e=>setFilters(f=>({...f,country:e.target.value}))} className="f-input"><option value="">All countries</option>{countries.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
        <div><label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>Age Range</label>
          <div style={{display:"flex",gap:5,alignItems:"center"}}><input className="f-input" type="number" value={filters.ageMin} onChange={e=>setFilters(f=>({...f,ageMin:e.target.value}))} placeholder="Min" style={{width:"50%"}}/><span style={{fontSize:11,color:"#94A3B8"}}>-</span><input className="f-input" type="number" value={filters.ageMax} onChange={e=>setFilters(f=>({...f,ageMax:e.target.value}))} placeholder="Max" style={{width:"50%"}}/></div></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>{"\uD83C\uDFE2"} Has Worked At</label>

function applyFiltersAndSort(results,filters,sortBy){
  let r=results.filter(c=>!c._imageOnly);
  if(filters.matchLevel) r=r.filter(c=>c.match_level===filters.matchLevel);
  if(filters.gender) r=r.filter(c=>c.gender===filters.gender);
  if(filters.country){const q=filters.country.toLowerCase();r=r.filter(c=>(c.nationality||"").toLowerCase().includes(q)||(c.location||"").toLowerCase().includes(q));}
  if(filters.ageMin) r=r.filter(c=>c.age!=null&&c.age>=parseInt(filters.ageMin));
  if(filters.ageMax) r=r.filter(c=>c.age!=null&&c.age<=parseInt(filters.ageMax));
  if(filters.companies?.length>0) r=r.filter(c=>filters.companies.some(fc=>(c.companies||[]).some(co=>co.toLowerCase()===fc.toLowerCase())));
  if(filters.universities?.length>0) r=r.filter(c=>filters.universities.some(fu=>(c.universities||[]).some(u=>u.toLowerCase()===fu.toLowerCase())));
  if(sortBy==="name") r.sort((a,b)=>a.candidate_name.localeCompare(b.candidate_name));
  else if(sortBy==="age") r.sort((a,b)=>(a.age??999)-(b.age??999));
  else if(sortBy==="age_desc") r.sort((a,b)=>(b.age??0)-(a.age??0));
  else if(sortBy==="exp") r.sort((a,b)=>(b.years_experience??0)-(a.years_experience??0));
  else if(sortBy==="me_exp") r.sort((a,b)=>(b.me_experience??0)-(a.me_experience??0));
  else r.sort((a,b)=>b.score-a.score);
  return r;
}

function downloadFile(content,filename,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

                <div key={i} style={{background:"white",border:"1px solid "+(isOpenImg?"#2563EB":"#DDD6FE"),borderRadius:12,overflow:"hidden"}}>
                  <div onClick={()=>setOpen(v=>v==="img"+i?null:"img"+i)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",cursor:"pointer",background:isOpenImg?"#F0F7FF":"transparent",userSelect:"none"}}>
                    <div style={{width:52,height:52,borderRadius:10,background:"#F5F3FF",border:"1.5px solid #DDD6FE",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:22}}>{"\uD83D\uDDBC\uFE0F"}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#0D2171",marginBottom:3}}>{c.candidate_name}</div>
                      <div style={{fontSize:11,color:"#7C3AED"}}>Image CV — not scored</div>
                    </div>
                    <span style={{fontSize:13,color:"#94A3B8",flexShrink:0}}>{isOpenImg?"\u25B2":"\u25BC"}</span>
                  </div>
                  {isOpenImg&&<div style={{borderTop:"1px solid #EDE9FE",padding:"14px 18px",background:"#FAFAFF"}}><CVViewer candidate={c}/></div>}
                </div>
              );
            })}
          </div>
        </div>}

        {rest.length>0&&<div style={{marginTop:10,padding:"12px 14px",background:"white",border:"1px solid #DBEAFE",borderRadius:10,maxWidth:820}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showAll?8:0}}>
            <div style={{fontSize:12,fontWeight:600,color:"#0D2171"}}>{rest.length} more candidate{rest.length!==1?"s":""} ranked below top {topN}</div>
            <button onClick={()=>setShowAll(s=>!s)} style={{background:"none",border:"1px solid #BFDBFE",color:"#2563EB",fontSize:12,cursor:"pointer",fontFamily:"inherit",padding:"4px 11px",borderRadius:7,fontWeight:600}}>{showAll?"Hide":"Show all"}</button>
          </div>
          {showAll&&<div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:320,overflowY:"auto",marginTop:8}}>
            {rest.map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 11px",background:"#F8FAFF",border:"1px solid #DBEAFE",borderRadius:7}}>
                <span style={{fontSize:11,color:"#94A3B8",fontWeight:600,minWidth:32}}>#{topN+i+1}</span>
                <span style={{flex:1,fontSize:12,color:"#0D2171",fontWeight:600}}>{r.candidate_name}</span>
                {r.age!=null&&<span style={{fontSize:11,color:"#7C3AED",fontWeight:500}}>Age {r.age}</span>}
                {(r.nationality||r.location)&&<span style={{fontSize:11,color:"#0891B2"}}>{"\uD83C\uDF0D"} {r.nationality||r.location}</span>}
                <span style={{fontSize:13,fontWeight:800,color:r.score>=75?"#10B981":r.score>=50?"#F59E0B":"#EF4444",minWidth:28,textAlign:"right"}}>{r.score}</span>
              </div>
            ))}
          </div>}
        </div>}
      </div>
    );
  }

  return(
    <div className="app-shell" style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {sidebar}
      <main className="app-main" style={{flex:1,background:"#EEF4FF",overflow:"hidden",display:"flex",flexDirection:"column"}}>{main}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
